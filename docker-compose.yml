services:
  openclaw:
    build:
      context: .
    container_name: openclaw
    restart: unless-stopped

    ports:
      - "${OPENCLAW_PORT:-3000}:3001"

    env_file:
      - .env

    environment:
      PUBLIC_ORIGIN: "http://localhost:${OPENCLAW_PORT:-3000}"
      OPENCLAW_GATEWAY_PASSWORD: "password123"

    volumes:
      - openclaw-state:/home/node/.openclaw

    security_opt:
      - no-new-privileges:true

volumes:
  openclaw-state:
